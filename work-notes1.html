<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Yumi工作笔记</title>
    <style>
        /* ========== 全局重置 ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft Yahei", "PingFang SC", Arial, sans-serif;
        }

        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            color: #333;
            background-color: #f5f7fa;
        }

        /* ========== 主体布局 ========== */
        .main-wrap {
            display: flex;
            flex: 1;
        }

        /* ========== 左侧分类栏 ========== */
        .sidebar {
            width: 240px;
            background: #2c3e50;
            color: #fff;
            padding: 20px;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }

        .sidebar h2 {
            margin-bottom: 20px;
            font-size: 18px;
            text-align: center;
            font-weight: 400;
            letter-spacing: 2px;
        }

        .category-item {
            padding: 10px 12px;
            margin: 4px 0;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
        }
        .category-item:hover {
            background: #34495e;
        }
        .category-item.active {
            background: #3498db;
        }

        .del-cate {
            color: #ff6b6b;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            padding: 0 4px;
            opacity: 0.6;
            transition: 0.2s;
        }
        .del-cate:hover {
            opacity: 1;
        }

        .add-cate-box {
            margin-top: 20px;
            display: flex;
            gap: 6px;
        }
        .add-cate-box input {
            flex: 1;
            padding: 8px 10px;
            border: none;
            border-radius: 4px;
            outline: none;
            font-size: 13px;
        }

        /* ========== 中间笔记列表 ========== */
        .note-list {
            width: 340px;
            background: #fff;
            border-right: 1px solid #e4e7ed;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }

        .list-header {
            padding: 16px;
            border-bottom: 1px solid #e4e7ed;
        }
        .search-input {
            width: 100%;
            padding: 9px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            outline: none;
            font-size: 14px;
            transition: 0.2s;
        }
        .search-input:focus {
            border-color: #3498db;
            box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.15);
        }

        .note-items {
            flex: 1;
            overflow-y: auto;
            padding: 4px 0;
        }

        .note-card {
            padding: 14px 16px;
            border-bottom: 1px solid #f0f0f0;
            cursor: pointer;
            transition: 0.15s;
        }
        .note-card:hover {
            background: #f8f9fa;
        }
        .note-card.active {
            background: #e8f4fd;
            border-left: 3px solid #3498db;
        }

        .note-card .note-title {
            font-weight: 600;
            margin-bottom: 4px;
            font-size: 15px;
            color: #2c3e50;
        }
        .note-card .note-meta {
            font-size: 12px;
            color: #999;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .note-card .note-tags {
            font-size: 12px;
            color: #3498db;
            margin-top: 4px;
        }
        .note-card .note-summary {
            font-size: 13px;
            color: #666;
            margin-top: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .note-card .has-image {
            display: inline-block;
            margin-left: 6px;
            font-size: 14px;
        }

        .empty-tip {
            padding: 50px 20px;
            text-align: center;
            color: #aaa;
            font-size: 14px;
        }

        /* ========== 右侧编辑面板 ========== */
        .editor-box {
            flex: 1;
            padding: 20px 28px 20px 24px;
            display: flex;
            flex-direction: column;
            background: #fafbfc;
            min-width: 0;
        }

        .editor-box h3 {
            margin-bottom: 16px;
            font-size: 20px;
            font-weight: 600;
            color: #2c3e50;
        }

        .form-row {
            margin-bottom: 14px;
        }
        .form-row label {
            display: block;
            margin-bottom: 5px;
            font-weight: 500;
            font-size: 14px;
            color: #555;
        }

        .form-row input[type="text"],
        .form-row select {
            width: 100%;
            padding: 9px 12px;
            border: 1px solid #dcdfe6;
            border-radius: 6px;
            font-size: 14px;
            outline: none;
            transition: 0.2s;
            background: #fff;
        }
        .form-row input[type="text"]:focus,
        .form-row select:focus {
            border-color: #3498db;
            box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.12);
        }

        /* ===== 编辑器工具栏 ===== */
        .editor-toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            padding: 6px 10px;
            background: #fff;
            border: 1px solid #dcdfe6;
            border-bottom: none;
            border-radius: 6px 6px 0 0;
            align-items: center;
        }
        .editor-toolbar .toolbar-sep {
            width: 1px;
            height: 26px;
            background: #ddd;
            margin: 0 4px;
        }
        .editor-toolbar button {
            padding: 4px 10px;
            border: 1px solid transparent;
            border-radius: 4px;
            background: transparent;
            cursor: pointer;
            font-size: 14px;
            transition: 0.15s;
            color: #444;
            height: 30px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 2px;
        }
        .editor-toolbar button:hover {
            background: #eef2f7;
            border-color: #d0d7e2;
        }
        .editor-toolbar button:active {
            background: #dce3ec;
        }
        .editor-toolbar button.tb-icon {
            font-size: 16px;
            padding: 4px 8px;
        }
        .editor-toolbar button.tb-label {
            font-size: 13px;
        }

        /* ===== 内容编辑区 (contentEditable) ===== */
        .editor-content {
            min-height: 280px;
            max-height: 520px;
            overflow-y: auto;
            padding: 14px 16px;
            background: #fff;
            border: 1px solid #dcdfe6;
            border-radius: 0 0 6px 6px;
            font-size: 14px;
            line-height: 1.8;
            outline: none;
            transition: 0.2s;
            color: #2c3e50;
        }
        .editor-content:focus {
            border-color: #3498db;
            box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.08);
        }
        /* 占位提示 */
        .editor-content:empty::before {
            content: attr(data-placeholder);
            color: #bbb;
            pointer-events: none;
        }

        /* 内容中的图片 */
        .editor-content img {
            max-width: 100%;
            height: auto;
            border-radius: 4px;
            margin: 6px 0;
            display: block;
        }
        /* 内容中的表格 */
        .editor-content table {
            border-collapse: collapse;
            width: 100%;
            margin: 10px 0;
            font-size: 13px;
        }
        .editor-content table th,
        .editor-content table td {
            border: 1px solid #ccc;
            padding: 6px 12px;
            text-align: left;
            vertical-align: top;
        }
        .editor-content table th {
            background: #f0f2f5;
            font-weight: 600;
        }
        .editor-content table tr:nth-child(even) {
            background: #fafbfc;
        }

        /* ===== 按钮组 ===== */
        .btn-group {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 14px;
        }
        .btn {
            padding: 9px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: 0.2s;
            background: #3498db;
            color: #fff;
        }
        .btn:hover {
            background: #2980b9;
            transform: translateY(-1px);
            box-shadow: 0 2px 8px rgba(52, 152, 219, 0.3);
        }
        .btn:active {
            transform: translateY(0);
        }
        .btn-secondary {
            background: #95a5a6;
        }
        .btn-secondary:hover {
            background: #7f8c8d;
        }
        .btn-danger {
            background: #e74c3c;
        }
        .btn-danger:hover {
            background: #c0392b;
            box-shadow: 0 2px 8px rgba(231, 76, 60, 0.3);
        }

        /* ===== 表格弹窗 ===== */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.45);
            z-index: 999;
            align-items: center;
            justify-content: center;
        }
        .modal-overlay.active {
            display: flex;
        }
        .modal-box {
            background: #fff;
            padding: 28px 34px 34px;
            border-radius: 12px;
            max-width: 380px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.25);
            animation: modalIn 0.2s ease;
        }
        @keyframes modalIn {
            from {
                opacity: 0;
                transform: scale(0.94) translateY(20px);
            }
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }
        .modal-box h4 {
            font-size: 18px;
            margin-bottom: 16px;
            color: #2c3e50;
        }
        .modal-box .modal-row {
            display: flex;
            gap: 16px;
            margin-bottom: 14px;
        }
        .modal-box .modal-row label {
            display: flex;
            flex-direction: column;
            flex: 1;
            font-size: 14px;
            color: #555;
        }
        .modal-box .modal-row input {
            padding: 8px 10px;
            border: 1px solid #dcdfe6;
            border-radius: 4px;
            font-size: 14px;
            width: 100%;
            margin-top: 4px;
            outline: none;
        }
        .modal-box .modal-row input:focus {
            border-color: #3498db;
        }
        .modal-box .modal-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 8px;
        }

        /* ===== 底部页脚 ===== */
        .site-footer {
            text-align: center;
            padding: 22px 15px;
            color: #aaa;
            font-size: 15px;
            background: #fff;
            border-top: 1px solid #e8eaed;
            letter-spacing: 1px;
        }

        /* ===== 滚动条美化 ===== */
        .note-items::-webkit-scrollbar,
        .editor-content::-webkit-scrollbar {
            width: 5px;
        }
        .note-items::-webkit-scrollbar-thumb,
        .editor-content::-webkit-scrollbar-thumb {
            background: #d0d7e2;
            border-radius: 4px;
        }
        .note-items::-webkit-scrollbar-track,
        .editor-content::-webkit-scrollbar-track {
            background: transparent;
        }

        /* ===== 响应式 ===== */
        @media (max-width: 1024px) {
            .sidebar {
                width: 200px;
                padding: 14px;
            }
            .note-list {
                width: 280px;
            }
        }

        @media (max-width: 820px) {
            .main-wrap {
                flex-direction: column;
            }
            .sidebar,
            .note-list {
                width: 100%;
                height: auto;
                max-height: 220px;
                overflow-y: auto;
                border-right: none;
                border-bottom: 1px solid #e4e7ed;
            }
            .sidebar {
                max-height: 180px;
                flex-direction: row;
                flex-wrap: wrap;
                align-items: center;
                gap: 6px;
                padding: 12px 16px;
            }
            .sidebar h2 {
                margin-bottom: 0;
                font-size: 15px;
                width: 100%;
                text-align: left;
            }
            .category-item {
                padding: 6px 12px;
                font-size: 13px;
                margin: 2px 0;
            }
            .add-cate-box {
                margin-top: 0;
                flex: 1;
                min-width: 140px;
            }
            .editor-box {
                padding: 16px;
            }
            .editor-content {
                min-height: 180px;
                max-height: 300px;
            }
        }

        @media (max-width: 480px) {
            .editor-toolbar button {
                padding: 2px 6px;
                font-size: 13px;
                height: 26px;
            }
            .modal-box {
                padding: 20px;
            }
            .btn-group .btn {
                padding: 7px 14px;
                font-size: 13px;
            }
        }
    </style>
</head>
<body>

    <!-- ===== 主体 ===== -->
    <div class="main-wrap">

        <!-- 左侧分类 -->
        <div class="sidebar">
            <h2>📂 知识分类</h2>
            <div id="categoryList"></div>
            <div class="add-cate-box">
                <input type="text" id="cateInput" placeholder="新增分类" />
                <button class="btn" onclick="addCategory()" style="padding:8px 14px;">+</button>
            </div>
        </div>

        <!-- 中间笔记列表 -->
        <div class="note-list">
            <div class="list-header">
                <input class="search-input" id="searchInput" placeholder="🔍 搜索标题 / 内容 / 关键字" oninput="renderNotes()" />
            </div>
            <div class="note-items" id="noteListBox"></div>
        </div>

        <!-- 右侧编辑面板 -->
        <div class="editor-box">
            <h3 id="editTitle">📝 新建工作笔记</h3>
            <input type="hidden" id="editId" />

            <div class="form-row">
                <label>笔记标题</label>
                <input type="text" id="noteTitle" placeholder="填写知识点标题" />
            </div>

            <div class="form-row">
                <label>所属分类</label>
                <select id="noteCate"></select>
            </div>

            <div class="form-row">
                <label>关键字标签（多个用空格隔开）</label>
                <input type="text" id="noteTags" placeholder="例如：vue 跨域 接口报错" />
            </div>

            <div class="form-row">
                <label>内容 / 经验记录</label>

                <!-- 工具栏 -->
                <div class="editor-toolbar">
                    <button type="button" onclick="execCmd('bold')" title="加粗"><b>B</b></button>
                    <button type="button" onclick="execCmd('italic')" title="斜体"><i>I</i></button>
                    <button type="button" onclick="execCmd('underline')" title="下划线"><u>U</u></button>
                    <span class="toolbar-sep"></span>
                    <button type="button" class="tb-icon" onclick="insertImage()" title="插入图片">🖼️</button>
                    <button type="button" class="tb-icon" onclick="showTableModal()" title="插入表格">📊</button>
                    <span class="toolbar-sep"></span>
                    <button type="button" class="tb-label" onclick="execCmd('removeFormat')" title="清除格式">清除</button>
                    <button type="button" class="tb-label" onclick="execCmd('insertUnorderedList')" title="无序列表">• 列表</button>
                </div>

                <!-- 内容编辑区 -->
                <div id="noteContent" class="editor-content" contenteditable="true"
                data-placeholder="记录遇到的问题、解决方案、专业知识点、踩坑经验… 支持图片、表格、加粗等格式"></div>
            </div>

            <div class="btn-group">
                <button class="btn" onclick="saveNote()">💾 保存笔记</button>
                <button class="btn btn-secondary" onclick="resetEditor()">🗑️ 清空新建</button>
                <button class="btn btn-danger" id="delBtn" style="display:none" onclick="deleteNote()">🗑️ 删除本条</button>
            </div>
        </div>
    </div>

    <!-- ===== 表格设置弹窗 ===== -->
    <div class="modal-overlay" id="tableModal">
        <div class="modal-box">
            <h4>📊 插入表格</h4>
            <div class="modal-row">
                <label>行数
                    <input type="number" id="tableRows" value="3" min="1" max="20" />
                </label>
                <label>列数
                    <input type="number" id="tableCols" value="4" min="1" max="20" />
                </label>
            </div>
            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="closeTableModal()">取消</button>
                <button class="btn" onclick="confirmInsertTable()">插入</button>
            </div>
        </div>
    </div>

    <!-- ===== 底部版权 ===== -->
    <footer class="site-footer">© 2026 是Yumi呀</footer>

    <script>
        // ================================================================
        //  存储 & 数据
        // ================================================================
        const STORAGE_CATE = "workNoteCate";
        const STORAGE_NOTE = "workNoteData";

        let categoryList = JSON.parse(localStorage.getItem(STORAGE_CATE)) || [
            "前端开发", "后端开发", "运维服务器", "产品需求", "其他"
        ];
        let noteList = JSON.parse(localStorage.getItem(STORAGE_NOTE)) || [];
        let currentCate = "";

        // ================================================================
        //  存储辅助
        // ================================================================
        function saveCateStorage() {
            localStorage.setItem(STORAGE_CATE, JSON.stringify(categoryList));
        }

        function saveNoteStorage() {
            localStorage.setItem(STORAGE_NOTE, JSON.stringify(noteList));
        }

        // ================================================================
        //  分类渲染
        // ================================================================
        function renderCategory() {
            const box = document.getElementById("categoryList");
            box.innerHTML = "";

            // "全部笔记"
            const allItem = document.createElement("div");
            allItem.className = "category-item " + (currentCate === "" ? "active" : "");
            allItem.innerHTML = `<span>📋 全部笔记</span><span class="del-cate"></span>`;
            allItem.onclick = () => {
                currentCate = "";
                renderCategory();
                renderNotes();
            };
            box.appendChild(allItem);

            categoryList.forEach((cate, idx) => {
                const div = document.createElement("div");
                div.className = "category-item " + (currentCate === cate ? "active" : "");
                div.innerHTML = `
                    <span>${cate}</span>
                    <span class="del-cate" onclick="event.stopPropagation();delCate(${idx})">×</span>
                `;
                div.onclick = () => {
                    currentCate = cate;
                    renderCategory();
                    renderNotes();
                };
                box.appendChild(div);
            });

            // 同步下拉
            const select = document.getElementById("noteCate");
            select.innerHTML = "";
            categoryList.forEach(c => {
                const opt = document.createElement("option");
                opt.value = c;
                opt.innerText = c;
                select.appendChild(opt);
            });
        }

        // ================================================================
        //  分类操作
        // ================================================================
        function addCategory() {
            const val = document.getElementById("cateInput").value.trim();
            if (!val || categoryList.includes(val)) return;
            categoryList.push(val);
            saveCateStorage();
            document.getElementById("cateInput").value = "";
            renderCategory();
        }

        function delCate(idx) {
            if (!confirm("确定删除该分类？该分类下笔记不会被删除，可重新归类。")) return;
            categoryList.splice(idx, 1);
            saveCateStorage();
            renderCategory();
            renderNotes();
        }

        // ================================================================
        //  获取过滤后的笔记
        // ================================================================
        function getFilterNotes() {
            const searchKey = document.getElementById("searchInput").value.trim().toLowerCase();
            return noteList.filter(item => {
                const cateMatch = currentCate ? item.category === currentCate : true;
                const searchMatch = searchKey ?
                    item.title.toLowerCase().includes(searchKey) ||
                    getPlainText(item.content).toLowerCase().includes(searchKey) ||
                    (item.tags || "").toLowerCase().includes(searchKey) :
                    true;
                return cateMatch && searchMatch;
            }).sort((a, b) => new Date(b.time) - new Date(a.time));
        }

        // 从HTML中提取纯文本
        function getPlainText(html) {
            if (!html) return "";
            const div = document.createElement("div");
            div.innerHTML = html;
            return div.textContent || div.innerText || "";
        }

        // 判断内容是否包含图片
        function hasImage(html) {
            return /<img[^>]*>/i.test(html);
        }

        // ================================================================
        //  渲染笔记列表
        // ================================================================
        function renderNotes() {
            const box = document.getElementById("noteListBox");
            const data = getFilterNotes();

            if (data.length === 0) {
                box.innerHTML = `<div class="empty-tip">📭 暂无笔记，新建一条记录经验吧</div>`;
                return;
            }

            box.innerHTML = "";
            data.forEach(item => {
                const div = document.createElement("div");
                div.className = "note-card";
                const plain = getPlainText(item.content);
                const summary = plain.length > 80 ? plain.slice(0, 80) + "…" : plain;
                const imgFlag = hasImage(item.content) ? ' <span class="has-image">🖼️</span>' : '';

                div.innerHTML = `
                    <div class="note-title">${item.title}${imgFlag}</div>
                    <div class="note-meta">
                        <span>${item.time}</span>
                        <span style="color:#888;">${item.category}</span>
                    </div>
                    ${item.tags ? `<div class="note-tags">🏷️ ${item.tags}</div>` : ''}
                    ${summary ? `<div class="note-summary">${summary}</div>` : ''}
                `;
                div.onclick = () => editNote(item.id);
                box.appendChild(div);
            });
        }

        // ================================================================
        //  编辑器操作 (contentEditable)
        // ================================================================
        function getContentEl() {
            return document.getElementById("noteContent");
        }

        // 执行 document.execCommand
        function execCmd(cmd, value) {
            document.execCommand(cmd, false, value || null);
            getContentEl().focus();
        }

        // 在光标位置插入 HTML
        function insertHTMLAtCursor(html) {
            const el = getContentEl();
            el.focus();
            const sel = window.getSelection();
            if (!sel.rangeCount) {
                // 没有选区，在末尾插入
                const range = document.createRange();
                range.setStart(el, el.childNodes.length);
                range.collapse(true);
                sel.removeAllRanges();
                sel.addRange(range);
            }
            const range = sel.getRangeAt(0);
            range.deleteContents();

            const temp = document.createElement("div");
            temp.innerHTML = html;
            const frag = document.createDocumentFragment();
            let node, lastNode;
            while ((node = temp.firstChild)) {
                lastNode = frag.appendChild(node);
            }
            range.insertNode(frag);

            if (lastNode) {
                range.setStartAfter(lastNode);
                range.collapse(true);
            }
            sel.removeAllRanges();
            sel.addRange(range);
            el.focus();
        }

        // ================================================================
        //  插入图片 (上传 + 压缩)
        // ================================================================
        function insertImage() {
            const input = document.createElement("input");
            input.type = "file";
            input.accept = "image/*";
            input.onchange = function(e) {
                const file = e.target.files[0];
                if (!file) return;
                // 限制大小 5MB
                if (file.size > 5 * 1024 * 1024) {
                    alert("图片大小超过 5MB，请压缩后上传。");
                    return;
                }
                const reader = new FileReader();
                reader.onload = function(ev) {
                    const dataUrl = ev.target.result;
                    compressImage(dataUrl, 800, 0.75, function(compressed) {
                        insertHTMLAtCursor(
                            `<img src="${compressed}" alt="笔记图片" style="max-width:100%;height:auto;border-radius:4px;margin:6px 0;" />`
                            );
                    });
                };
                reader.readAsDataURL(file);
            };
            input.click();
        }

        // 图片压缩
        function compressImage(dataUrl, maxWidth, quality, callback) {
            const img = new Image();
            img.onload = function() {
                let w = img.width;
                let h = img.height;
                if (w > maxWidth) {
                    h = h * (maxWidth / w);
                    w = maxWidth;
                }
                const canvas = document.createElement("canvas");
                canvas.width = w;
                canvas.height = h;
                const ctx = canvas.getContext("2d");
                ctx.imageSmoothingEnabled = true;
                ctx.imageSmoothingQuality = "high";
                ctx.drawImage(img, 0, 0, w, h);
                const out = canvas.toDataURL("image/jpeg", quality);
                callback(out);
            };
            img.src = dataUrl;
        }

        // ================================================================
        //  插入表格 (弹窗)
        // ================================================================
        function showTableModal() {
            document.getElementById("tableModal").classList.add("active");
            document.getElementById("tableRows").value = 3;
            document.getElementById("tableCols").value = 4;
            // 自动聚焦
            setTimeout(() => document.getElementById("tableRows").focus(), 100);
        }

        function closeTableModal() {
            document.getElementById("tableModal").classList.remove("active");
        }

        function confirmInsertTable() {
            const rows = parseInt(document.getElementById("tableRows").value) || 3;
            const cols = parseInt(document.getElementById("tableCols").value) || 4;
            if (rows < 1 || cols < 1 || rows > 20 || cols > 20) {
                alert("行数和列数请控制在 1 ~ 20 之间。");
                return;
            }
            let html = '<table border="1" style="border-collapse:collapse;width:100%;margin:10px 0;">';
            // 表头
            html += '<thead><tr>';
            for (let c = 0; c < cols; c++) {
                html += `<th>列${c+1}</th>`;
            }
            html += '</tr></thead><tbody>';
            for (let r = 0; r < rows; r++) {
                html += '<tr>';
                for (let c = 0; c < cols; c++) {
                    html += `<td> </td>`;
                }
                html += '</tr>';
            }
            html += '</tbody></table>';
            insertHTMLAtCursor(html);
            closeTableModal();
        }

        // 点击弹窗外部关闭
        document.getElementById("tableModal").addEventListener("click", function(e) {
            if (e.target === this) closeTableModal();
        });
        // 键盘 Enter 确认
        document.addEventListener("keydown", function(e) {
            if (e.key === "Enter" && document.getElementById("tableModal").classList.contains("active")) {
                const active = document.activeElement;
                if (active && (active.id === "tableRows" || active.id === "tableCols")) {
                    confirmInsertTable();
                }
            }
            if (e.key === "Escape") closeTableModal();
        });

        // ================================================================
        //  重置编辑器 (新建模式)
        // ================================================================
        function resetEditor() {
            document.getElementById("editId").value = "";
            document.getElementById("noteTitle").value = "";
            document.getElementById("noteCate").value = categoryList[0] || "";
            document.getElementById("noteTags").value = "";
            const el = getContentEl();
            el.innerHTML = "";
            el.focus();
            document.getElementById("editTitle").innerText = "📝 新建工作笔记";
            document.getElementById("delBtn").style.display = "none";
        }

        // ================================================================
        //  编辑笔记 (回填)
        // ================================================================
        function editNote(id) {
            const item = noteList.find(n => n.id === id);
            if (!item) return;

            document.getElementById("editId").value = item.id;
            document.getElementById("noteTitle").value = item.title;
            document.getElementById("noteCate").value = item.category;
            document.getElementById("noteTags").value = item.tags || "";

            const el = getContentEl();
            // 如果内容包含 HTML 标签则直接使用，否则将换行转 <br>
            if (/<[a-z][\s\S]*>/i.test(item.content)) {
                el.innerHTML = item.content;
            } else {
                el.innerHTML = item.content.replace(/\n/g, '<br>');
            }

            document.getElementById("editTitle").innerText = "✏️ 编辑笔记 - " + item.title;
            document.getElementById("delBtn").style.display = "block";
            el.focus();
            // 光标移至末尾
            const range = document.createRange();
            range.selectNodeContents(el);
            range.collapse(false);
            const sel = window.getSelection();
            sel.removeAllRanges();
            sel.addRange(range);
        }

        // ================================================================
        //  保存笔记
        // ================================================================
        function saveNote() {
            const id = document.getElementById("editId").value;
            const title = document.getElementById("noteTitle").value.trim();
            const cate = document.getElementById("noteCate").value;
            const tags = document.getElementById("noteTags").value.trim();
            const content = getContentEl().innerHTML.trim();

            if (!title) {
                alert("请填写笔记标题。");
                document.getElementById("noteTitle").focus();
                return;
            }
            if (!content || content === "<br>" || content === "<div><br></div>") {
                alert("请填写笔记内容。");
                getContentEl().focus();
                return;
            }

            const now = new Date().toLocaleString("zh-CN", { hour12: false });

            if (id) {
                // 编辑
                const idx = noteList.findIndex(n => n.id === id);
                if (idx !== -1) {
                    noteList[idx] = {
                        ...noteList[idx],
                        title,
                        category: cate,
                        tags,
                        content,
                        time: now
                    };
                }
            } else {
                // 新增
                noteList.unshift({
                    id: Date.now().toString(),
                    title,
                    category: cate,
                    tags,
                    content,
                    time: now
                });
            }

            saveNoteStorage();
            renderNotes();
            resetEditor();
            // 高亮提示
            const btn = document.querySelector('.btn-group .btn');
            const orig = btn.innerText;
            btn.innerText = '✅ 保存成功！';
            setTimeout(() => { btn.innerText = orig; }, 1200);
        }

        // ================================================================
        //  删除笔记
        // ================================================================
        function deleteNote() {
            const id = document.getElementById("editId").value;
            if (!id || !confirm("确定要删除这条笔记吗？删除后无法恢复！")) return;
            noteList = noteList.filter(n => n.id !== id);
            saveNoteStorage();
            renderNotes();
            resetEditor();
        }

        // ================================================================
        //  键盘快捷键: Ctrl+S 保存
        // ================================================================
        document.addEventListener("keydown", function(e) {
            if ((e.ctrlKey || e.metaKey) && e.key === "s") {
                e.preventDefault();
                saveNote();
            }
        });

        // ================================================================
        //  初始化
        // ================================================================
        window.onload = function() {
            renderCategory();
            renderNotes();
            resetEditor();
            // 默认选中第一个分类
            if (categoryList.length) {
                document.getElementById("noteCate").value = categoryList[0];
            }
        };
    </script>

</body>
